<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0b0b0c" />
    <title>MobileFlow Documentation</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("mf:theme") || "system";
          var resolved =
            stored === "system"
              ? matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : stored;
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
