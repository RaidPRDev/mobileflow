services:
  postgres:
    image: postgres:16-alpine
    container_name: mobileflow_dev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mobileflow
      POSTGRES_PASSWORD: mobileflow
      POSTGRES_DB: mobileflow
    ports:
      - "5432:5432"
    volumes:
      - mobileflow_dev_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobileflow"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mobileflow_dev_db:
